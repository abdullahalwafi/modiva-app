{% load widget_tweaks %}
<div class="card">
    <span id="title" hidden>{{ title }} </span> 
{% include 'includes/spinner.html' %}
    <div class="card-body">
        <form hx-indicator='#loading' hx-post="{% url 'mytask:log-aktifitas-kirim' object.id %}" hx-target="#main-content" hx-swap="innerHTML">
            {% csrf_token %}
            <input type='hidden' name='produk_id' value='{{produk.id}}'>
            <div class="row mb-3">
                <label for="id_produk" class="col-sm-3 col-form-label">Produk</label>
                <div class="col-sm-9">
                   <input type='text' class="form-control" value="{{produk.nama}}" readonly>
                </div>
            </div>
            <div class="row mb-3">
                <label for="id_tanggal" class="col-sm-3 col-form-label">Tanggal</label>
                <div class="col-sm-9">
                   <input type='date' name='tanggal' class="form-control" value="{{object.created_at.date|date:'Y-m-d'}}" readonly>
                </div>
            </div>
            <div class="row mb-3">
                <label for="id_waktu_awal" class="col-sm-3 col-form-label">Waktu Awal</label>
                <div class="col-sm-9">
                   <input type='time' class="form-control" name='waktu_awal' value="{% if awal %}{{awal}}{% else %}{{object.created_at.time|time:'H:i'}}{% endif %}">
                </div>
            </div>
            <div class="row mb-3">
                <label for="id_waktu_awal" class="col-sm-3 col-form-label">Waktu Akhir</label>
                <div class="col-sm-9">
                   <input type='time' class="form-control" name='waktu_akhir' value="{% if akhir %}{{akhir}}{% else %}{{object.updated_at.time|time:'H:i'}}{% endif %}">
                </div>
            </div>
            <br />
            <div class="card-footer">
                <a hx-indicator='#loading' hx-target="#main-content" hx-swap="innerHTML" hx-trigger="click"
                    hx-get="{% url 'mytask:log-aktifitas'  %}" class="btn btn-secondary"><i class="fa fa-undo"></i> Batal</a>
                &nbsp;
                <button type="submit" class="btn btn-primary">
                    <i class="fa fa-paper-plane-o"></i> Kirim
                </button>
            </div>
        </form>
    </div>
</div>
{% include 'includes/set_title.html' %}
