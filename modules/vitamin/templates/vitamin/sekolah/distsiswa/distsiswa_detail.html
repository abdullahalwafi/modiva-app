{% block content %}
<div id="kt_content" class="content flex-row-fluid">
  <span id="title" hidden>{{ title }} </span>
<div class="card mb-5 mb-xxl-8">
<div class="card-body pt-9 pb-0">
    <div class="row mb-7">
        <label class="col-lg-4 fw-semibold text-muted">Id</label>
        <div class="col-lg-8">
            <span class="fw-bold fs-6 text-gray-800">{{ object.id }}</span>
        </div>
    </div>
    <br>
    <div class="row mb-7">
        <label class="col-lg-4 fw-semibold text-muted">NIS</label>
        <div class="col-lg-8">
            <span class="fw-bold fs-6 text-gray-800">{{ object.nis }}</span>
        </div>
    </div>
    <br>
    <div class="row mb-7">
        <label class="col-lg-4 fw-semibold text-muted">Nama Siswa</label>
        <div class="col-lg-8">
            <span class="fw-bold fs-6 text-gray-800">{{ object.nama_siswa }}</span>
        </div>
    </div>
    <br>
    <div class="row mb-7">
        <label class="col-lg-4 fw-semibold text-muted">Jumlah</label>
        <div class="col-lg-8">
            <span class="fw-bold fs-6 text-gray-800">{{ object.jumlah }}</span>
        </div>
    </div>
    <br>
    <div class="row mb-7">
        <label class="col-lg-4 fw-semibold text-muted">Tanggal Terima</label>
        <div class="col-lg-8">
            <span class="fw-bold fs-6 text-gray-800">{{ object.tgl_terima | date:"d-m-Y" }}</span>
        </div>
    </div>
    <br>
    <div class="row mb-7">
        <label class="col-lg-4 fw-semibold text-muted">Kelas</label>
        <div class="col-lg-8">
            <span class="fw-bold fs-6 text-gray-800">{{ object.kelas }}</span>
        </div>
    </div>
    <br>
    <div class="row mb-7">
        <label class="col-lg-4 fw-semibold text-muted">Sekolah</label>
        <div class="col-lg-8">
            <span class="fw-bold fs-6 text-gray-800">{{ object.sekolah.nama }}</span>
        </div>
    </div>
    <br>
    <div class="row mb-7">
        <label class="col-lg-4 fw-semibold text-muted">Vitamin</label>
        <div class="col-lg-8">
            <span class="fw-bold fs-6 text-gray-800">{{ object.vitamin.nama }}</span>
        </div>
    </div>
    <br>
       
    
   
</div>
    <div class="card-footer">
      <a href="{% url 'vitamin:distsiswa-list'  %}" class="btn btn-secondary">
        <i class="fa fa-undo"></i> Kembali
      </a>
    </div>
 </div>
 </div>
{% endblock content %}
{% include 'includes/set_title.html' %}
