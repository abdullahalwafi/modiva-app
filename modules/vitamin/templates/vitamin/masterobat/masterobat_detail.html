{% block content %}
<div id="kt_content" class="content flex-row-fluid">
  <span id="title" hidden>{{ title }} </span>
<div class="card mb-5 mb-xxl-8">
<div class="card-body pt-9 pb-0">
    <div class="row mb-7">
        <label class="col-lg-4 fw-semibold text-muted">Id</label>
        <div class="col-lg-8">
            <span class="fw-bold fs-6 text-gray-800">{{ object.id }}</span>
        </div>
    </div>
    <br>
    <div class="row mb-7">
        <label class="col-lg-4 fw-semibold text-muted">Merk</label>
        <div class="col-lg-8">
            <span class="fw-bold fs-6 text-gray-800">{{ object.merk }}</span>
        </div>
    </div>
    <br>
    <div class="row mb-7">
        <label class="col-lg-4 fw-semibold text-muted">Pabrik</label>
        <div class="col-lg-8">
            <span class="fw-bold fs-6 text-gray-800">{{ object.pabrik }}</span>
        </div>
    </div>
    <br>
    <div class="row mb-7">
        <label class="col-lg-4 fw-semibold text-muted">Tanggal Kadaluarsa</label>
        <div class="col-lg-8">
            <span class="fw-bold fs-6 text-gray-800">{{ object.kadaluarsa | date:"d-m-Y" }}</span>
        </div>
    </div>
    <br>
    <div class="row mb-7">
        <label class="col-lg-4 fw-semibold text-muted">Isi</label>
        <div class="col-lg-8">
            <span class="fw-bold fs-6 text-gray-800">{{ object.isi }}</span>
        </div>
    </div>
    <br>
    <div class="row mb-7">
        <label class="col-lg-4 fw-semibold text-muted">Batch Number</label>
        <div class="col-lg-8">
            <span class="fw-bold fs-6 text-gray-800">{{ object.batchnumber }}</span>
        </div>
    </div>
    <br>
    <div class="row mb-7">
        <label class="col-lg-4 fw-semibold text-muted">Vitamin</label>
        <div class="col-lg-8">
            <span class="fw-bold fs-6 text-gray-800">{{ object.vitamin.nama }}</span>
        </div>
    </div>
    <br>
    <div class="row mb-7">
        <label class="col-lg-4 fw-semibold text-muted">Satuan</label>
        <div class="col-lg-8">
            <span class="fw-bold fs-6 text-gray-800">{{ object.satuan.nama }}</span>
        </div>
    </div>
       
    <br>
   
</div>
    <div class="card-footer">
<a href="{% url 'vitamin:masterobat-list' %}" class="btn btn-secondary">
  <i class="fa fa-undo"></i> Kembali
</a>
    </div>
 </div>
 </div>
{% endblock content %}
{% include 'includes/set_title.html' %}
