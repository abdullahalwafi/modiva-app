{% comment %}
<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#preview_file_pdf">
    Preview
</button>
{% endcomment %}

<div class="modal fade" tabindex="-1" id="preview_file_pdf">
    <div class="modal-dialog modal-dialog-scrollable modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Preview File</h5>

                <!--begin::Close-->
                <div class="btn btn-icon btn-sm btn-active-light-primary ms-2" data-bs-dismiss="modal" aria-label="Close">
                    <i class="ki-duotone ki-cross fs-2x"><span class="path1"></span><span class="path2"></span></i>
                </div>
                <!--end::Close-->
            </div>

            <div class="modal-body">
                <p>Long modal body text goes here.</p>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Close</button>
                {% comment %}<button type="button" class="btn btn-primary">Save changes</button>{% endcomment %}
            </div>
        </div>
    </div>
</div>

{% if table_name == 'keu_tags' or table_name == 'vw_keu_kegiatan_mapping' %}
    <div id="excelUploadModal" class="modal">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Excel Upload Form</h5>
                    <button type="button" class="close text-gray" style="border:none" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body">
                    <form method="post" enctype="multipart/form-data">
                        <div class="mb-3">
                            <button type="button" id="excelDownloadBtn" class="btn btn-secondary" onclick="window.location.href='{% url "mdm:download_template" mdm_table_name=table_name %}'">Download Template</button>
                        </div>
                        {% csrf_token %}
                        {{ excel_upload_form.as_p }}
                        <div class="modal-footer">
                            <button type="submit" class="btn btn-primary ml-auto">Submit</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endif %}
