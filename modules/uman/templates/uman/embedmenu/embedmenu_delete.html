<div class="card">
  <span id="title" hidden>{{ title }} </span>
  <div class="card-body">
    <form hx-post="{% url 'uman:embedmenu-delete' object.pk %}" hx-target="#main-content" hx-swap="innerHTML">
      {% csrf_token %}
      {% for hidden in form.hidden_fields %}
        {{ hidden }}
      {% endfor %}

      <div class="form-group"> 
        <b>Anda Yakin Data akan Dihapus ?</b>
        <ol>
          <li> Menu            : {{ object.menu }}</li>
          <li> Secret Key      : {{ object.secretkey }}</li>
          <li> Url Metabase    : {{ object.url_metabase }}</li>
        </ol>
      </div>
    
      <div class="card-footer">
        <a hx-target="#main-content" hx-swap="innerHTML" hx-trigger="click" hx-get="{% url 'uman:embedmenu-list'  %}" class="btn btn-secondary mr-2"><i class="fa fa-undo"></i> Batal</a>
        <button type="submit" class="btn btn-danger">
          <i class="fa fa-trash"></i> Hapus
        </button>
      </div>
    </form>
  </div>
 </div>
 {% include 'includes/set_title.html' %}
