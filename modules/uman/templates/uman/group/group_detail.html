{% load static  %}
{% block content %}
<div id="kt_content" class="content flex-row-fluid">
  <span id="title" hidden>{{ title }} </span>
<div class="card mb-5 mb-xxl-8">
<div class="card-body pt-9 pb-0">
    <div class="row mb-7">
        <label class="col-lg-4 fw-semibold text-muted">Nama Group</label>
        <div class="col-lg-8">
            <span class="fw-bold fs-6 text-gray-800">{{ object.name }}</span>
        </div>
    </div>
    <div class="row mb-7">
        <label class="col-lg-4 fw-semibold text-muted">Ijin Akses</label>
        <div class="col-lg-8">
             {% for p in object.permissions.all %}
              <span class="badge badge-light-primary badge-lg fw-bold me-auto px-4 py-3">{{p.name|upper}}</span>
             {% endfor %}
        </div>
    </div>
    </div>
    <div class="card-footer">
      <a hx-target="#main-content" hx-indicator="#loading" hx-swap="innerHTML" hx-trigger="click" hx-get="{% url 'uman:group-list'  %}" class="btn btn-secondary mr-2"><i class="fa fa-undo"></i> Kembali</a>
    </div>
 </div>
 </div>
{% endblock content %}
{% block javascripts %}
 {% include 'includes/set_title.html' %}
{% endblock %}
