{% load static  %}
{% load uman_tags %}
{% block content %}
<div id="kt_content" class="content flex-row-fluid">
  <span id="title" hidden>{{ title }} </span>
<div class="card mb-5 mb-xxl-8">
<div class="card-body pt-9 pb-0">
    <div class="row mb-7">
        <label class="col-lg-4 fw-semibold text-muted">Namespace</label>
        <div class="col-lg-8">
            <span class="fw-bold fs-6 text-gray-800">{{ object.namespace }}</span>
        </div>
    </div>
    <div class="row mb-7">
        <label class="col-lg-4 fw-semibold text-muted">Key</label>
        <div class="col-lg-8">
            <span class="fw-bold fs-6 text-gray-800">{{ object.key}}</span>
        </div>
    </div>
    <div class="row mb-7">
        <label class="col-lg-4 fw-semibold text-muted">Value</label>
        <div class="col-lg-8">
            <span class="fw-bold fs-6 text-gray-800">{{ object.value}}</span>
        </div>
    </div>
    <div class="row mb-7">
        <label class="col-lg-4 fw-semibold text-muted">Deskripsi</label>
        <div class="col-lg-8">
            <span class="fw-bold fs-6 text-gray-800">{{ object.description }}</span>
        </div>
    </div>
    </div>
    <div class="card-footer">
      <a hx-target="#main-content" hx-swap="innerHTML" hx-trigger="click" hx-get="{% url 'uman:appconfig-list'  %}" class="btn btn-secondary"><i class="fa fa-undo"></i> Kembali</a>
    </div>
 </div>
</div>
{% endblock content %}
{% block javascripts %}
 {% include 'includes/set_title.html' %}
{% endblock javascripts %}
