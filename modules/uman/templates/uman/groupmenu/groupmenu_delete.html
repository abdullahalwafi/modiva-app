{% load widget_tweaks %}
<div class="card">
  <span id="title" hidden>{{ title }} </span> 
  <div class="card-body">
    <form hx-post="{% url 'uman:groupmenu-delete' object.pk %}" hx-target="#main-content" hx-swap="innerHTML">
      {% csrf_token %}
      {% for hidden in form.hidden_fields %}
        {{ hidden }}
      {% endfor %}

      <div class="form-group"> 
        <b>Anda Yakin Data akan Dihapus ?</b>
        <ol>
          <li> Menu       : {% for mn in object.menu.all %}{{mn.name}}, {% endfor %}</li>
          <li> Group      : {{ object.group }}</li>
        </ol>
      </div>
    
      <div class="card-footer">
        <a hx-target="#main-content" hx-swap="innerHTML" hx-trigger="click" hx-get="{% url 'uman:groupmenu-list'  %}" class="btn btn-secondary mr-2"> <i class="fa fa-undo"></i> Batal</a>
        <button type="submit" class="btn btn-danger">
          <i class="fa fa-trash"></i> Hapus
        </button>
      </div>
    </form>
  </div>
 </div>
 {% include 'includes/set_title.html' %}
