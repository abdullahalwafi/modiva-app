{% load core_tags %}
{% load static %}
{% include 'includes/alerts.html' %}
<div class="row g-6 g-xl-9 mb-6 mb-xl-9">
{% for app in aplikasis %}    
                    <!--begin::Col-->
            <div class="col-md-6 col-lg-4 col-xl-3">
                <!--begin::Card-->
                <div class="card h-100 ">
                    <!--begin::Card body-->
                    <div class="card-body d-flex justify-content-center text-center flex-column p-8">
                        <!--begin::Name-->
                        <a href="{% if app.url %}{% if app.as_modul %}{% make_absolute_path app.url %}{% else %}{{app.url}}{% endif%}{% endif %}" {% if not app.as_modul %}target="_blank"{% endif %} class="text-gray-800 text-hover-primary d-flex flex-column">
                            <!--begin::Image-->
                            <div class="symbol symbol-60px mb-5">
                              <img src="{% get_media_prefix %}/{{ app.image }}" class="theme-light-show" alt="{{app.name}}">
                            </div>
                            <!--end::Image-->
                            <!--begin::Title-->
                            <div class="fs-5 fw-bold mb-2">
                                {{app.name}}
                            </div>
                            <!--end::Title-->
                        </a>
                        <!--end::Name-->

                        <!--begin::Description-->
                        <div class="fs-7 fw-semibold text-gray-500">
                            {{app.description}}
                        </div>
                        <!--end::Description-->
                    </div>
                    <!--end::Card body-->
                </div>
                <!--end::Card-->
            </div>
            <!--end::Col-->
{% endfor %}
</div>
