<script>
    // project data table
    $(document).ready(function() {
        var table = $('#myDataTable').DataTable( {
            scrollY:        "450px",
            scrollX:        true,
            scrollCollapse: true,
            paging:         true,
            //fixedColumns:   {
            //    left: 3,
            //},
            bFilter: true,
            bInfo: true,
            pageLength: 25,
            bLengthChange: false,
            buttons: ["csv", "excel", "pdf"],
        }).buttons().container().appendTo("#myDataTable_wrapper .col-md-6:eq(0)");

    /* Begin:: Datatables Info Pemda */
        var datatables_infoPemda = function() {
            // Shared variables
            var table, datatable;

            // Private Functions
            var initDatatable = function() {
                table.querySelectorAll('tbody tr');  
                
                // Init datatable --- more info on datatables: https://datatables.net/manual/
                datatable = $(table).DataTable({
                    "info": true,
                    'order': [],
                    'pageLength': 10,
                });
            } 

            // Hook export buttons
            var exportButtons = function() {
                const documentTitle = 'Informasi PEMDA';
                var buttons = new $.fn.dataTable.Buttons(table, {
                    buttons: [
                        {
                            extend: 'copyHtml5',
                            title: documentTitle
                        },
                        {
                            extend: 'excelHtml5',
                            title: documentTitle
                        },
                        {
                            extend: 'csvHtml5',
                            title: documentTitle
                        },
                        {
                            extend: 'pdfHtml5',
                            title: documentTitle
                        }
                    ]
                }).container().appendTo($('#datatables_infoPemda_buttons'));
                // Hook dropdown menu click event to datatable export buttons
                const exportButtons = document.querySelectorAll('#datatables_infoPemda_export_menu [data-kt-export]');
                exportButtons.forEach(exportButton => {
                    exportButton.addEventListener('click', e => {
                        e.preventDefault();

                        // Get clicked export value
                        const exportValue = e.target.getAttribute('data-kt-export');
                        const target = document.querySelector('.dt-buttons .buttons-' + exportValue);

                        // Trigger click event on hidden datatable export buttons
                        target.click();
                    });
                });
            }
            
            // Search Datatable --- official docs reference: https://datatables.net/reference/api/search()
            var handleSearchDatatable = () => {
                const filterSearch = document.querySelector('[data-kt-filter="search"]');
                filterSearch.addEventListener('keyup', function (e) {
                    datatable.search(e.target.value).draw();
                });
            }

            // Public methods
            return {
                init: function () {
                    table = document.querySelector('table#datatables_infoPemda');

                    if ( !table ) {
                        return;
                    }

                    initDatatable();
                    exportButtons();
                    // handleSearchDatatable();
                }
            };
        }();

        datatables_infoPemda.init();
    /* End:: Datatables Info Pemda */
    });

</script>
