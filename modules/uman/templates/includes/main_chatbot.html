{% load static %}



<!-- Tombol Buka Chat -->
<button id="openChat">

  <img src="{{ MEDIA_URL }}aplikasi/icon-diva.png" alt="Diva Icon">
</button>


<!-- Chat Widget (Custom, bukan modal Bootstrap) -->


<div id="chatModal"
  style="display: none; position: fixed; bottom: 100px; right: 32px; width: 350px; max-height: 500px; z-index: 1060; flex-direction: column; border-radius: 1rem; background-color: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.2);">

  <!-- Header -->
  <div class="bg-default text-white px-3 py-2 rounded-top">
    <div class="d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center gap-2">
        <img src="{{ MEDIA_URL }}aplikasi/icon-diva.png" alt="Ka Diva"
          style="width: 62px; height: 62px; border-radius: 50%; object-fit: cover;">

        <div class="mb-0" style="color:black;">Tanya <br><strong>AI Assistant</strong></div>
      </div>

      <button type="button" style="color: black;" class="btn-close btn-close-black" aria-label="Tutup"
        onclick="closeAndRefresh()"></button>

    </div>

    <!-- Dropdown model (rapi, di bawah judul) -->
    <!-- <div class="mt-2">
      <label for="model-select" class="form-label mb-1 small">Pilih Model</label>
      <select id="model-select" class="form-select form-select-sm">
        <option value="">-- Pilih Model --</option>
        <option value="llama3-70b-8192" selected>LLaMA 3 - 70B</option>
        <option value="gemma2-9b-it">Gemma 7B</option>
        <option value="deepseek-r1-distill-llama-70b">DeepSeek Coder 33B</option>
      </select>

      
    </div> -->
  </div>

  <!-- Chat box -->
  <div style="padding: 10px; background: #fafafa; overflow-y: auto; height: 300px;" id="chat-box">
    <!-- Chat messages will appear here -->
  </div>

  <!-- Input area -->
  <div class="d-flex gap-2 p-2 border-top">
    <input type="text" id="user-input" class="form-control" placeholder="Ketik pesan..." autocomplete="off">
    <button class="btn btn-primary" id="sendMessage">Kirim</button>
  </div>
</div>





<!-- chatbot JS File -->
<script src="{% static 'chatbot/js/chat.js' %}"></script>



<script>
  function closeAndRefresh() {
    document.getElementById('chatModal').style.display = 'none';
    location.reload(); // ⬅️ Ini akan reload halaman
  }
</script>
<style>
  .model-icon {
    width: 28px;
    height: 28px;
    cursor: pointer;
    opacity: 0.6;
    transition: 0.2s ease-in-out;
  }

  .model-icon:hover {
    opacity: 1;
    transform: scale(1.1);
  }

  .model-icon.selected {
    border: 2px solid #9c0f0f;
    border-radius: 50%;
    opacity: 1;
  }

  #openChat:hover {
    background-color: #157347;
    /* darken on hover */
    border-radius: 5px;
  }

  #openChat {
    position: fixed;
    bottom: 32px;
    right: 32px;
    z-index: 1055;
    background: none;
    border: none;
    padding: 0;
    width: 60px;
    height: 60px;
    cursor: pointer;
  }

  #openChat img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
</style>
