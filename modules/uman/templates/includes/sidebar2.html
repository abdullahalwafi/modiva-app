{% load static %}
{% load core_tags %}
<div class="sidebar px-3 py-2 py-md-3">
        <div class="d-flex flex-column h-100">

            <div class="user-details mb-4 px-4">
                <div class="d-flex align-items-start justify-content-center">
                    <div>
                      {% if profil.foto_profil %}
                        <img class="avatar lg rounded-circle" src="{% get_media_prefix %}/{{profil.foto_profil}}" id='foto_profil2' alt="avatar lg"  title="Profile pic of {{user.username}}">
                      {% else %}
                        <img class="avatar lg rounded-circle" src="{% static 'assets/images/profile_av.png' %}" id='foto_profil2' alt="avatar lg" title="Profile pic of {{user.username}}">
                      {% endif %}
                    </div>
                    <div class="media-body text-light ms-3">
                        <small>{{ user.username }}</small>
                        <br/>
                        <small>{{ pemda_user.nm_pemda }}</small>
                    </div>
                </div>
            </div>
            <br/><br/>
            <!-- Menu: main ul -->
            <ul class="menu-list flex-grow-1 mt-1 px-4">
                {% show_menu request.path user %}                
            </ul>

            <!-- Menu: menu collepce btn -->
            <button type="button" class="btn btn-link sidebar-mini-btn text-light">
                <span class="ms-2"><i class="fa fa-arrow-left"></i></span>
            </button>
        </div>
    </div>
