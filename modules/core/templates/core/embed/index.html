{% extends 'core/base.html' %}
{% load core_tags %}
{% block content %}
<div class="col-12">
  <div id="main-content">
     <span id="title" hidden>{{ title }} </span>
    <div class="card">
        <div class="card-body">
        {% include 'includes/alerts.html' %}
        {% if menu %}
        <iframe src="{% if mbiframe_url %}{{mbiframe_url}}{% else %}{{menu.url_embed}}{% endif %}" width="100%" height="1000" allowtransparency></iframe>
        {% endif %}
        </div>
      </div>
    </div>
</div>
{% endblock %}
{% block javascripts %}
    {% include 'includes/set_title.html' %}
{% endblock javascripts %}
